<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vector Tiles</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute;
            top: 10px; right: 10px;
            background: white; padding: 10px; border-radius: 5px;
            z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.2);
            font-family: sans-serif; font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel" id="info">Đang tải...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.min.js"></script>
    <script>
        // Tọa độ trung tâm Đà Lạt
        const map = L.map('map').setView([11.9416, 108.4383], 15);

        // Lớp nền OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Lớp VectorGrid
        const vectorUrl = '/map-tiles/dalat-v3/{z}/{x}/{y}.pbf';
        
        const qhLayer = L.vectorGrid.protobuf(vectorUrl, {
            minZoom: 13,
            maxZoom: 19,
            vectorTileLayerStyles: {
                dxf_layer: function(properties, zoom) {
                    return {
                        weight: 2,
                        color: '#ff0000',
                        fillColor: '#ff0000',
                        fillOpacity: 0.2,
                        fill: true,
                        opacity: 1,
                    };
                }
            },
            interactive: true,
            getFeatureId: function(f) {
                return f.properties.layer;
            }
        });

        // Xử lý sự kiện để debug
        let tilesLoaded = 0;
        qhLayer.on('load', function() {
            document.getElementById('info').innerHTML = 'Vector Layer: Đã tải xong ' + tilesLoaded + ' tiles.<br>Nếu không thấy màu đỏ, có thể file PBF rỗng hoặc lỗi parse.';
        });

        // Vì VectorGrid không emit sự kiện 'tileload' chuẩn như raster,
        // chúng ta monkey patch method _getVectorTilePromise để log.
        const originalGetTile = L.VectorGrid.Protobuf.prototype._getVectorTilePromise;
        L.VectorGrid.Protobuf.prototype._getVectorTilePromise = function(coords, tileBounds) {
            const url = this._getSubdomain(coords, this._url);
            console.log('Đang request tile:', url);
            return originalGetTile.call(this, coords, tileBounds).then(function(vtile) {
                tilesLoaded++;
                document.getElementById('info').innerHTML = 'Đang tải... (' + tilesLoaded + ' tiles)';
                if (vtile.layers && vtile.layers.dxf_layer) {
                    console.log('Tile OK, số lượng tính năng:', vtile.layers.dxf_layer.length);
                } else {
                    console.warn('Tile trống hoặc không có layer dxf_layer!');
                }
                return vtile;
            }).catch(function(err) {
                console.error('Lỗi khi tải tile:', err);
                throw err;
            });
        };

        qhLayer.addTo(map);

        qhLayer.on('click', function(e) {
            L.popup()
                .setContent('Layer: ' + e.layer.properties.layer + '<br>Type: ' + e.layer.properties.type)
                .setLatLng(e.latlng)
                .openOn(map);
            L.DomEvent.stop(e);
        });

        map.on('moveend', function() {
            console.log('Current Map Bounds:', map.getBounds());
            console.log('Current Map Center:', map.getCenter());
            console.log('Current Zoom:', map.getZoom());
        });
    </script>
</body>
</html>
