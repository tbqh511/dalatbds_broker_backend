<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Map — QH Đà Lạt 2030 (PNG Raster V3)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        #map { width: 100%; height: 100vh; }

        .info-panel {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.95); padding: 12px 16px;
            border-radius: 10px; z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 13px; max-width: 320px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.08);
        }
        .info-panel h3 { font-size: 14px; margin-bottom: 6px; color: #1a1a2e; }
        .info-panel .stat { color: #555; font-size: 12px; line-height: 1.6; }

        .controls-panel {
            position: absolute; top: 10px; left: 60px;
            background: rgba(255,255,255,0.95); padding: 10px 14px;
            border-radius: 10px; z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.08);
            display: flex; flex-direction: column; gap: 8px;
        }
        .controls-panel label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500; }
        .controls-panel input[type="range"] { width: 120px; }
        .controls-panel .slider-label { font-size: 11px; color: #888; }

        .version-badge {
            display: inline-block; padding: 2px 8px;
            border-radius: 4px; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-v3 { background: #e0f5e9; color: #0a7d3f; }
        .badge-png { background: #e8f0fe; color: #1a56db; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="info-panel" id="info">
        <h3>🗺 QH Đà Lạt 2030 <span class="version-badge badge-v3">V3</span> <span class="version-badge badge-png">PNG</span></h3>
        <div class="stat" id="statText">Đang tải...</div>
    </div>

    <div class="controls-panel" id="controls">
        <label>
            <input type="checkbox" id="toggleQH" checked>
            Hiển thị lớp QH 2030
        </label>
        <div>
            <label>Độ trong suốt: <span id="opacityVal">70%</span></label>
            <input type="range" id="opacitySlider" min="0" max="100" value="70">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function(){
        // ═══════════════════════════════════════════════════════════════════
        // MAP INITIALIZATION — PNG Raster Tiles (V3)
        // ═══════════════════════════════════════════════════════════════════

        const map = L.map('map', { maxZoom: 19 }).setView([11.9416, 108.4383], 15);

        // Base layer: OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://osm.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // QH 2030 PNG raster overlay (served from MBTiles via MapTileController.php)
        const qhLayer = L.tileLayer('/map-tiles/dalat-v3/{z}/{x}/{y}.png', {
            attribution: 'QH 2030 &copy; UBND TP Đà Lạt',
            minZoom: 13,
            maxZoom: 18,
            maxNativeZoom: 18,
            opacity: 0.7,
            tms: false,
        }).addTo(map);

        // ═══════════════════════════════════════════════════════════════════
        // CONTROLS
        // ═══════════════════════════════════════════════════════════════════

        // Toggle QH layer
        const toggleCb = document.getElementById('toggleQH');
        toggleCb.addEventListener('change', function() {
            if (this.checked) {
                qhLayer.addTo(map);
            } else {
                map.removeLayer(qhLayer);
            }
        });

        // Opacity slider
        const opacitySlider = document.getElementById('opacitySlider');
        const opacityVal = document.getElementById('opacityVal');
        opacitySlider.addEventListener('input', function() {
            const val = parseInt(this.value) / 100;
            qhLayer.setOpacity(val);
            opacityVal.textContent = this.value + '%';
        });

        // ═══════════════════════════════════════════════════════════════════
        // STATS DISPLAY
        // ═══════════════════════════════════════════════════════════════════
        map.on('moveend', updateStats);
        updateStats();

        function updateStats() {
            const z = map.getZoom();
            const c = map.getCenter();
            const inRange = z >= 13 && z <= 18;
            document.getElementById('statText').innerHTML =
                'Zoom: <b>' + z + '</b> · ' +
                'Lat: ' + c.lat.toFixed(4) + ' · ' +
                'Lng: ' + c.lng.toFixed(4) +
                '<br><span style="font-size:11px;color:' + (inRange ? '#0a7d3f' : '#d93025') + ';">' +
                (inRange
                    ? '✅ Tiles hiển thị (z13-18)'
                    : '⚠️ Ngoài phạm vi tiles (z13-18). ' + (z < 13 ? 'Zoom vào thêm.' : 'Tiles z18 được over-zoom.')) +
                '</span>' +
                '<br><span style="font-size:11px;color:#888;">Format: PNG Raster · Source: MBTiles V3</span>';
        }

        // ═══════════════════════════════════════════════════════════════════
        // TILE LOAD MONITOR (for debugging)
        // ═══════════════════════════════════════════════════════════════════
        let tileCount = 0;
        let tileErrors = 0;
        qhLayer.on('tileload', function() { tileCount++; });
        qhLayer.on('tileerror', function(e) {
            tileErrors++;
            console.warn('[Tile Error]', e.coords, e.error);
        });

        // Log summary after tiles load
        qhLayer.on('load', function() {
            console.log('[QH Layer] Tiles loaded:', tileCount, '| Errors:', tileErrors);
        });
    })();
    </script>
</body>
</html>
